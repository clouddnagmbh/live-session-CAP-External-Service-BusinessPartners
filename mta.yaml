_schema-version: 3.3.0
ID: business-partners
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: business-partners-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: business-partners-auth
      - name: business-partners-db
      - name: business-partners-destination

  - name: business-partners-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: business-partners-db

  - name: business-partners-app-deployer
    type: com.sap.application.content
    path: gen
    build-parameters:
      build-result: app/
      requires:
        - name: businesspartnersbusinesspartnersexample
          artifacts:
            - business-partners-example.zip
          target-path: app/
    requires:
      - name: srv-api
      - name: business-partners-auth
      - name: business-partners-app-front
        parameters:
          content-target: true
    parameters:
      config:
        destinations:
          - name: srv-api
            url: ~{srv-api/srv-url}
            forwardAuthToken: true
          - name: ui5
            url: https://ui5.sap.com

  - name: businesspartnersbusinesspartnersexample
    type: html5
    path: app/business-partners-example
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

resources:
  - name: business-partners-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: business-partners-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
  - name: business-partners-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: business-partners-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
  - name: business-partners-app-front
    type: org.cloudfoundry.managed-service
    parameters:
      service: app-front
      service-plan: developer
